<div class="flex h-screen bg-slate-50 dark:bg-zinc-950 font-sans text-slate-900 dark:text-zinc-100 overflow-hidden">
  
  <!-- Sidebar -->
  <aside 
    class="bg-white/80 dark:bg-zinc-900/50 border-r border-slate-200/60 dark:border-zinc-800/50 flex flex-col transition-all duration-500 ease-in-out z-20 backdrop-blur-xl"
    [ngClass]="{'w-64': isSidebarExpanded(), 'w-20': !isSidebarExpanded()}">
    
    <!-- Sidebar Header -->
    <div class="h-20 flex items-center px-6 justify-between">
      <div class="flex items-center gap-3 overflow-hidden transition-all duration-500" [ngClass]="{'opacity-100 w-auto': isSidebarExpanded(), 'opacity-0 w-0 hidden': !isSidebarExpanded()}">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-600 flex items-center justify-center text-white font-bold shrink-0 shadow-lg shadow-indigo-500/30">
          TF
        </div>
        <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-zinc-400 whitespace-nowrap">TaskFlow</span>
      </div>
      
      <button 
        (click)="toggleSidebar()" 
        class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800 text-slate-500 dark:text-zinc-400 transition-all hover:scale-110 active:scale-95"
        [attr.aria-label]="isSidebarExpanded() ? 'Collapse Sidebar' : 'Expand Sidebar'">
        <lucide-icon [img]="isSidebarExpanded() ? icons.chevronLeft : icons.menu" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

    <!-- Navigation Area -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
      @for (item of navItems; track item.route) {
        @if (authService.userRole() === 'admin' || (item.label === 'My Tasks' || item.label === 'Projects' || item.label === 'Settings')) {
          <a 
            [routerLink]="item.route" 
            routerLinkActive="!bg-indigo-50 !text-indigo-700 dark:!bg-indigo-500/10 dark:!text-indigo-400 !shadow-sm" 
            [routerLinkActiveOptions]="{exact: false}"
            class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-500 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800/50 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all font-medium group relative overflow-hidden">
            <lucide-icon [img]="item.icon" class="w-5 h-5 shrink-0 transition-transform duration-300 group-hover:scale-110"></lucide-icon>
            <span 
              class="whitespace-nowrap transition-all duration-500 origin-left"
              [ngClass]="{'opacity-100 scale-100': isSidebarExpanded(), 'opacity-0 scale-0 hidden': !isSidebarExpanded()}">
              {{ item.label }}
            </span>
            <!-- Active Indicator -->
            <div 
              class="absolute left-0 w-1 h-6 bg-indigo-600 dark:bg-indigo-400 rounded-r-full transition-transform duration-300 -translate-x-full"
              [routerLinkActive]="'translate-x-0'">
            </div>
          </a>
        }
      }
    </nav>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-slate-100 dark:border-zinc-800/50">
      <button 
        (click)="logout()"
        class="flex items-center gap-3 w-full px-3 py-3 rounded-xl text-rose-500 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all font-medium group"
        [ngClass]="{'justify-center': !isSidebarExpanded()}">
        <lucide-icon [img]="icons.logOut" class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"></lucide-icon>
        <span 
          class="whitespace-nowrap transition-all duration-500 origin-left"
          [ngClass]="{'opacity-100 scale-100': isSidebarExpanded(), 'opacity-0 scale-0 hidden': !isSidebarExpanded()}">
          Logout
        </span>
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    
    <!-- Top Navbar -->
    <header class="h-20 bg-white/80 dark:bg-zinc-900/50 border-b border-slate-200/60 dark:border-zinc-800/50 flex flex-shrink-0 items-center justify-between px-8 z-10 backdrop-blur-xl">
      
      <!-- Breadcrumbs -->
      <div class="flex items-center gap-2 text-sm font-medium">
        <span class="text-slate-400 hidden sm:block">Pages</span>
        <lucide-icon [img]="icons.chevronLeft" class="w-3 h-3 text-slate-300 dark:text-zinc-600 rotate-180 hidden sm:block"></lucide-icon>
        <span class="text-slate-900 dark:text-white capitalize font-bold tracking-tight">Dashboard</span>
      </div>

      <!-- Right side actions -->
      <div class="flex items-center gap-8">
        
        <!-- Search bar -->
        <div class="relative hidden lg:block">
          <lucide-icon [img]="icons.search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-zinc-500"></lucide-icon>
          <input 
            type="text" 
            placeholder="Search anything..." 
            (input)="taskService.searchQuery.set($any($event.target).value)"
            class="glass-input pl-11 w-72 focus:w-80">
        </div>

        <div class="flex items-center gap-3">
          <!-- Theme Toggle -->
          <button 
            (click)="themeService.toggleDarkMode()"
            class="p-2.5 text-slate-500 dark:text-zinc-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800"
            title="Toggle Theme">
            <lucide-icon [img]="themeService.darkMode() ? icons.sun : icons.moon" class="w-5 h-5"></lucide-icon>
          </button>

          <!-- Notification Bell -->
          <button class="relative p-2.5 text-slate-500 dark:text-zinc-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800">
            <lucide-icon [img]="icons.bell" class="w-5 h-5"></lucide-icon>
            <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full ring-2 ring-white dark:ring-zinc-900"></span>
          </button>
          
          <div class="h-6 w-px bg-slate-200 dark:bg-zinc-800 mx-2"></div>

          <!-- User Profile -->
          <button class="flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-zinc-800/50 p-1.5 rounded-2xl transition-all group">
            <div class="w-9 h-9 rounded-xl bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 flex items-center justify-center font-bold overflow-hidden ring-2 ring-white dark:ring-zinc-800">
               <img src="https://i.pravatar.cc/150?u=99" alt="User">
            </div>
            <div class="hidden md:block text-left">
              <p class="text-sm font-bold text-slate-900 dark:text-white leading-tight">Alex Morrison</p>
              <p class="text-[10px] text-slate-400 dark:text-zinc-500 font-bold uppercase tracking-wider">{{ authService.userRole() }}</p>
            </div>
          </button>
        </div>
        
      </div>
    </header>

    <!-- Main View -->
    <main class="flex-1 overflow-y-auto p-8 relative">
      <div class="max-w-7xl mx-auto w-full h-full">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Global Floating Background Blobs (Dark Mode Only) -->
    <div class="fixed top-0 right-0 -translate-y-1/2 translate-x-1/4 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full -z-10 pointer-events-none opacity-0 dark:opacity-100"></div>
    <div class="fixed bottom-0 left-0 translate-y-1/2 -translate-x-1/4 w-[500px] h-[500px] bg-violet-500/10 blur-[120px] rounded-full -z-10 pointer-events-none opacity-0 dark:opacity-100"></div>
  </div>
</div>
